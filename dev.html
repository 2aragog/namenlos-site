<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>NAMENLOS</title>
<meta name="description" content="The shop has no address. But it has a word.">
<meta name="theme-color" content="#0a0a0a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;color:#c8a060;font-family:'Cormorant Garamond',Georgia,serif;cursor:default;-webkit-font-smoothing:antialiased}

/* ══════ TOP NAV ══════ */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(10,10,10,0.9),transparent);pointer-events:none}
.top-nav *{pointer-events:auto}
.top-nav a{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#3a3025;text-decoration:none;padding:5px 10px;border:1px solid transparent;transition:all 0.3s}
.top-nav a:hover{color:#c8a060;border-color:#2a2218}
.top-nav .brand-link{letter-spacing:5px;border:none;padding:0}
.top-nav .brand-link:hover{color:#5a4a35}

/* ══════ SCENES ══════ */
.scene{position:fixed;inset:0;opacity:0;visibility:hidden;transition:opacity 1s;z-index:1}
.scene.active{opacity:1;visibility:visible;z-index:10}
.scene.behind{opacity:1;visibility:visible;z-index:5}

/* ══════ LAYERS ══════ */
.layer{position:absolute;background-size:cover;background-position:center;will-change:transform;transition:transform .12s ease-out}
.layer-bg{z-index:1}.layer-mid{z-index:2}.layer-fg{z-index:3;pointer-events:none}
.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,.65) 100%);z-index:4;pointer-events:none}

/* ══════ DUST ══════ */
.dust-box{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:5}
.dust{position:absolute;width:2px;height:2px;background:rgba(200,160,96,.25);border-radius:50%;animation:dFloat linear infinite}
@keyframes dFloat{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) translateX(30px);opacity:0}}

/* ══════ HOTSPOTS ══════ */
.hotspot{position:absolute;z-index:20;cursor:pointer;border:1.5px solid rgba(200,160,96,0);border-radius:6px;transition:all .4s}
.hotspot:hover{border-color:rgba(200,160,96,.45);background:rgba(200,160,96,.04);box-shadow:0 0 20px rgba(200,160,96,.08)}
.hs-glow{position:absolute;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle,rgba(200,160,96,.5),transparent 70%);animation:pulse 2.5s ease-in-out infinite;pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%)}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(2);opacity:.15}}
.hs-label{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#c8a060;white-space:nowrap;opacity:0;transition:opacity .3s;text-shadow:0 0 12px #000,0 0 24px #000;pointer-events:none}
.hotspot:hover .hs-label{opacity:1}

/* ══════ NAV ══════ */
.nav-back{position:absolute;top:18px;left:18px;z-index:30;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#3a3025;cursor:pointer;transition:color .3s;text-shadow:0 0 12px #000}
.nav-back:hover{color:#c8a060}
.nav-back::before{content:'← '}

/* ══════ CODE SCREEN ══════ */
#code-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a}
.brand{font-family:'Cinzel',serif;font-size:12px;letter-spacing:8px;text-transform:uppercase;color:#3a3025;margin-bottom:50px;animation:fadeUp 2.5s ease both}
.prompt-text{font-size:15px;font-style:italic;color:#5a4a35;margin-bottom:28px;animation:fadeUp 2.5s ease .4s both}
@keyframes fadeUp{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
#code-input{background:none;border:none;border-bottom:1px solid #1a1510;color:#c8a060;font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;text-align:center;width:220px;padding:8px 0;outline:none;caret-color:#c8a060;animation:fadeUp 2.5s ease .8s both}
#code-input::placeholder{color:#1a1510}
#code-error{font-size:12px;color:#6b1c1c;margin-top:12px;opacity:0;transition:opacity .3s;font-style:italic}

/* ══════ ITEM OVERLAY ══════ */
#item-overlay{position:fixed;inset:0;background:rgba(5,5,5,.93);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .5s;cursor:pointer}
#item-overlay.open{opacity:1;visibility:visible}
.item-inner{position:relative;max-width:750px;width:90%;display:flex;flex-direction:column;align-items:center;gap:24px}
.item-img{width:100%;max-height:50vh;object-fit:contain;filter:drop-shadow(0 0 30px rgba(200,160,96,.08));animation:zoomIn .5s ease both}
@keyframes zoomIn{0%{transform:scale(.92);opacity:0}100%{transform:scale(1);opacity:1}}
.item-title{font-family:'Cinzel',serif;font-size:16px;letter-spacing:4px;text-transform:uppercase;color:#c8a060}
.item-lore{font-size:15px;line-height:1.8;color:#7a6a55;text-align:center;max-width:480px;font-style:italic}
.item-book-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#4a3a28;padding:8px 18px;border:1px solid #2a2218;cursor:pointer;transition:all .3s;display:none}
.item-book-btn:hover{color:#c8a060;border-color:#c8a060}
.close-x{position:absolute;top:-36px;right:0;font-family:'Cinzel',serif;font-size:13px;color:#3a3025;cursor:pointer;letter-spacing:2px;transition:color .3s}
.close-x:hover{color:#c8a060}

/* ══════ BOOK PANEL ══════ */
#book-panel{position:fixed;bottom:0;left:0;right:0;z-index:510;background:linear-gradient(to top,#0a0808 60%,rgba(10,8,8,.95) 80%,transparent);padding:36px 28px 28px;transform:translateY(100%);transition:transform .6s cubic-bezier(.22,1,.36,1);max-height:65vh;overflow-y:auto}
#book-panel.open{transform:translateY(0)}
.panel-close{position:absolute;top:8px;right:18px;font-family:'Cinzel',serif;font-size:12px;color:#3a3025;cursor:pointer;letter-spacing:2px}
.panel-close:hover{color:#c8a060}
.book-header{font-family:'Cinzel',serif;font-size:22px;letter-spacing:5px;text-transform:uppercase;color:#c8a060;margin-bottom:5px}
.book-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#4a3a28;font-family:'Cinzel',serif;margin-bottom:16px}
.book-excerpt{font-size:15px;line-height:1.9;color:#6a5a45;max-width:560px;font-style:italic;margin-bottom:24px}
.buy-options{display:flex;gap:12px;flex-wrap:wrap}
.buy-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:10px 20px;border:1px solid #2a2218;color:#7a6a55;cursor:pointer;transition:all .3s;background:none;text-decoration:none;display:inline-block}
.buy-btn:hover{border-color:#c8a060;color:#c8a060}
.buy-btn.primary{border-color:#6b1c1c;color:#c8a060;background:rgba(107,28,28,.15)}

/* ══════ CHAT ══════ */
#chat-panel{position:absolute;bottom:0;left:0;right:0;height:42%;background:linear-gradient(to top,rgba(10,8,5,.97) 65%,transparent);z-index:25;display:flex;flex-direction:column;padding:36px 24px 16px}
#chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:#1a1510 transparent}
.chat-msg{max-width:80%;font-size:14px;line-height:1.7;animation:msgIn .4s ease both}
@keyframes msgIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
.chat-msg.sk{color:#7a6a55;font-style:italic;align-self:flex-start}.chat-msg.sk::before{content:'— ';color:#3a3025}
.chat-msg.vis{color:#c8a060;align-self:flex-end;text-align:right}
#chat-input-row{display:flex;gap:10px;margin-top:12px}
#chat-input{flex:1;background:none;border:none;border-bottom:1px solid #1a1510;color:#c8a060;font-family:'Cormorant Garamond',serif;font-size:14px;padding:6px 0;outline:none;caret-color:#c8a060}
#chat-input::placeholder{color:#2a2218;font-style:italic}
#chat-send{background:none;border:1px solid #1a1510;color:#4a3a28;font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:7px 14px;cursor:pointer;transition:all .3s}
#chat-send:hover{border-color:#c8a060;color:#c8a060}

/* ══════ COINS ══════ */
#coins{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:#3a3025;display:flex;align-items:center;gap:5px;opacity:0;transition:opacity .5s}
#coins.show{opacity:1}
.coin-dot{width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c8a060,#5a4020);border:1px solid #8a7040}

@keyframes flicker{0%,100%{opacity:1}93%{opacity:.87}94%{opacity:1}96%{opacity:.92}97%{opacity:1}}
.flickering{animation:flicker 7s ease-in-out infinite}

@media(max-width:768px){.mode-cards{flex-direction:column}.mode-card{width:100%;max-width:280px}#chat-panel{height:50%}.buy-options{flex-direction:column}}
</style>
</head>
<body>

<div class="top-nav">
  <a class="brand-link" href="index.html">Namenlos</a>
  <div style="display:flex;gap:10px">
    <a href="classic.html">Classic</a>
  </div>
</div>

<div id="coins"><div class="coin-dot"></div><span id="coin-n">0</span></div>

<!-- CODE -->
<div id="code-screen" class="scene">
  <div class="brand">Namenlos</div>
  <div class="prompt-text">Say it.</div>
  <input type="text" id="code-input" placeholder="..." autocomplete="off" spellcheck="false">
  <div id="code-error">The shop doesn't recognize that word.</div>
</div>

<!-- ALLEY -->
<div id="alley" class="scene">
  <div class="layer layer-bg" data-speed=".2" style="background-image:url(img/alley.png)"></div>
  <div class="vignette"></div><div class="dust-box"></div>
  <div class="hotspot" style="left:12%;top:15%;width:18%;height:65%" data-goto="threshold">
    <div class="hs-glow"></div><div class="hs-label">Enter</div>
  </div>
</div>

<!-- THRESHOLD -->
<div id="threshold" class="scene">
  <div class="layer layer-bg" data-speed=".2" style="background-image:url(img/threshold2.png)"></div>
  <div class="vignette"></div>
</div>

<!-- SHOP -->
<div id="shop" class="scene">
  <div class="layer layer-bg flickering" data-speed=".15" style="background-image:url(img/shop.png)"></div>
  <div class="vignette"></div><div class="dust-box"></div>
  <div class="hotspot" style="left:2%;top:8%;width:30%;height:70%" data-goto="shopkeeper-view">
    <div class="hs-glow" style="top:35%;left:60%"></div>
    <div class="hs-label" style="top:37%;bottom:auto;left:60%">The Shopkeeper</div>
  </div>
  <div class="hotspot" style="left:34%;top:15%;width:28%;height:65%" data-goto="shelf-view">
    <div class="hs-glow"></div><div class="hs-label">Artifacts</div>
  </div>
  <div class="hotspot" style="right:5%;top:20%;width:20%;height:50%" data-goto="cinema-view">
    <div class="hs-glow"></div><div class="hs-label">Cinema ↓</div>
  </div>
</div>

<!-- SHELF -->
<div id="shelf-view" class="scene">
  <div class="layer layer-bg" data-speed=".2" style="background-image:url(img/shelf.png)"></div>
  <div class="vignette"></div><div class="dust-box"></div>
  <div class="nav-back" data-goto="shop">Back</div>
  <div class="hotspot" style="left:1%;top:42%;width:15%;height:48%" data-item="hourglass">
    <div class="hs-glow"></div><div class="hs-label">Hourglass</div>
  </div>
  <div class="hotspot" style="left:18%;top:42%;width:22%;height:48%" data-item="glove">
    <div class="hs-glow"></div><div class="hs-label">The Glove</div>
  </div>
  <div class="hotspot" style="left:50%;top:42%;width:16%;height:48%" data-item="mirror">
    <div class="hs-glow"></div><div class="hs-label">Mirror</div>
  </div>
  <div class="hotspot" style="right:2%;top:42%;width:15%;height:48%" data-item="hourglass">
    <div class="hs-glow"></div><div class="hs-label">Hourglass</div>
  </div>
  <div class="hotspot" style="left:28%;top:2%;width:24%;height:38%" data-item="tarot">
    <div class="hs-glow"></div><div class="hs-label">The Box</div>
  </div>
</div>

<!-- SHOPKEEPER -->
<div id="shopkeeper-view" class="scene">
  <div class="layer layer-bg" data-speed=".2" style="background-image:url(img/shopkeeper.jpg)"></div>
  <div class="vignette"></div>
  <div class="nav-back" data-goto="shop">Back</div>
  <div class="hotspot" style="left:35%;top:72%;width:22%;height:16%" data-item="whip">
    <div class="hs-glow"></div><div class="hs-label">The Whip</div>
  </div>
  <div id="chat-panel">
    <div id="chat-messages"><div class="chat-msg sk">Welcome. Or welcome back. The shop doesn't distinguish.</div></div>
    <div id="chat-input-row">
      <input type="text" id="chat-input" placeholder="Speak..." autocomplete="off">
      <button id="chat-send">Send</button>
    </div>
  </div>
</div>

<!-- CINEMA -->
<div id="cinema-view" class="scene">
  <div class="layer layer-bg" data-speed=".2" style="background-image:url(img/cinema.png)"></div>
  <div class="vignette"></div>
  <div class="nav-back" data-goto="shop">Back</div>
  <div style="position:absolute;top:18%;left:24%;width:52%;height:44%;background:#000;z-index:20;display:flex;align-items:center;justify-content:center">
    <span style="font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;color:#2a2218;text-transform:uppercase">Episode 1 — Coming Soon</span>
  </div>
</div>

<!-- OVERLAYS -->
<div id="item-overlay">
  <div class="item-inner">
    <div class="close-x">✕</div>
    <img class="item-img" src="" alt="">
    <div class="item-title"></div>
    <div class="item-lore"></div>
    <div class="item-book-btn"></div>
  </div>
</div>
<div id="book-panel"><div class="panel-close">✕</div><div id="bp-content"></div></div>

<script>
const S={mode:localStorage.getItem('nm-mode')||'',coins:+localStorage.getItem('nm-coins')||0,known:localStorage.getItem('nm-known')==='1',cur:'code-screen',chat:[]};

const items={whip:{img:'img/whip.png',title:'The Whip',lore:'Black leather. Braided tight. The handle is bone — smooth from centuries of hands.',book:'Skin Me',bid:'skin-me'},wig:{img:'img/wig.png',title:'The Wig',lore:'Auburn curls spilling like fire frozen mid-fall. The wig has been watching everyone.',book:'Carry Me',bid:'carry-me'},mirror:{img:'img/mirror.png',title:'The Mirror',lore:'Open it and the glass shows not your face, but the face you\'ll wear in ten years.'},glove:{img:'img/glove.png',title:'The Glove',lore:'Red kid leather, the left hand only. She never dropped anything again. But she couldn\'t let go.'},hourglass:{img:'img/hourglass.png',title:'The Hourglass',lore:'The sand is red. The sand flows upward. Every grain is a second someone wished they could take back.',book:'Warum Mütter töten?',bid:'warum'},tarot:{img:'img/tarot.png',title:'The Tarot Box',lore:'Every card has a name. Every name has a price. The Strength card chose you.',book:'Lay Me',bid:'lay-me'},coins:{img:'img/coins.png',title:'The Drawer',lore:'Old currencies from places that no longer exist. The shopkeeper accepts any coin — but not money.'}};

const books={'skin-me':{title:'Skin Me',sub:'Namenlos · Book 1 · Paranormal Dark Romance 18+',excerpt:'The shop had no sign. No address. No name anyone remembered...',btns:[{l:'Standard — $25',u:'#',p:1},{l:'Premium — $49',u:'#'},{l:'Subscribe — $7.99/mo',u:'#'}]},'carry-me':{title:'Carry Me',sub:'Namenlos · Book 2 · Coming Soon',excerpt:'The red wig on the shelf is watching you.',btns:[{l:'Waitlist',u:'#',p:1}]},'warum':{title:'Warum Mütter töten?',sub:'Namenlos · Book 3 · Coming Soon',excerpt:'The hourglass holds red sand. The sand flows upward.',btns:[{l:'Waitlist',u:'#',p:1}]},'lay-me':{title:'Lay Me',sub:'Namenlos · Coming Soon',excerpt:'Inside the box: a tarot deck.',btns:[{l:'Waitlist',u:'#',p:1}]}};

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.dust-box').forEach(c=>{for(let i=0;i<20;i++){const d=document.createElement('div');d.className='dust';d.style.left=Math.random()*100+'%';d.style.animationDuration=(8+Math.random()*12)+'s';d.style.animationDelay=Math.random()*10+'s';c.appendChild(d)}});
  updC();
  const p=new URLSearchParams(location.search);
  if(p.get('r')==='1'||S.known){S.known=true;localStorage.setItem('nm-known','1')}
  if(S.mode){applyMode(S.mode);goTo(S.known?'alley':'code-screen',true)}
  else{S.mode='parallax';applyMode('parallax');goTo(S.known?'alley':'code-screen',true)}

  document.getElementById('code-input').addEventListener('keydown',e=>{if(e.key==='Enter'){const v=e.target.value.trim().toLowerCase();if(['nimm mich','547','nimm','vergiss'].includes(v)){S.known=true;localStorage.setItem('nm-known','1');if(v==='vergiss')addC(5);goTo('alley')}else{document.getElementById('code-error').style.opacity='1';e.target.value='';setTimeout(()=>document.getElementById('code-error').style.opacity='0',2000)}}});

  document.querySelectorAll('.hotspot[data-goto]').forEach(h=>h.onclick=()=>goTo(h.dataset.goto));
  document.querySelectorAll('.nav-back[data-goto]').forEach(n=>n.onclick=()=>goTo(n.dataset.goto));
  document.querySelectorAll('.hotspot[data-item]').forEach(h=>h.onclick=()=>showItem(h.dataset.item));
  document.querySelector('.close-x').onclick=closeItem;
  document.getElementById('item-overlay').onclick=e=>{if(e.target.id==='item-overlay')closeItem()};
  document.querySelector('.panel-close').onclick=()=>document.getElementById('book-panel').classList.remove('open');

  document.addEventListener('mousemove',e=>{
    if(S.mode!=='parallax')return;
    const cx=e.clientX/innerWidth-.5,cy=e.clientY/innerHeight-.5;
    document.querySelectorAll('.scene.active .layer').forEach(l=>{
      const sp=parseFloat(l.dataset.speed)||.2;
      l.style.transform=`translate(${-cx*sp*60}px,${-cy*sp*40}px) scale(1.02)`;
    });
  });

  document.getElementById('chat-send').onclick=sendChat;
  document.getElementById('chat-input').onkeydown=e=>{if(e.key==='Enter')sendChat()};
});

function applyMode(m){
  document.querySelectorAll('.layer').forEach(l=>{
    if(m==='classic'){l.style.inset='0';l.style.transform='none'}
    else{l.style.inset='-30px';l.style.transform='scale(1.02)'}
  });
}

function goTo(id,inst){
  const cur=document.querySelector('.scene.active'),nxt=document.getElementById(id);
  if(!nxt||(cur&&cur.id===id))return;
  if(id==='threshold'){if(cur){cur.classList.remove('active');cur.classList.add('behind')}nxt.classList.add('active');setTimeout(()=>{nxt.classList.remove('active');if(cur)cur.classList.remove('behind');goTo('shop')},1200);return}
  if(inst){if(cur)cur.classList.remove('active','behind');nxt.classList.add('active')}
  else{if(cur){cur.classList.remove('active');cur.classList.add('behind')}nxt.classList.add('active');setTimeout(()=>{if(cur)cur.classList.remove('behind')},1100)}
  S.cur=id;
  if(['shop','shelf-view','shopkeeper-view','cinema-view'].includes(id))document.getElementById('coins').classList.add('show');
  if(id==='shelf-view'&&!localStorage.getItem('nm-sv')){localStorage.setItem('nm-sv','1');addC(1)}
}

function showItem(k){const it=items[k];if(!it)return;const o=document.getElementById('item-overlay');o.querySelector('.item-img').src=it.img;o.querySelector('.item-title').textContent=it.title;o.querySelector('.item-lore').textContent=it.lore;const bb=o.querySelector('.item-book-btn');if(it.book){bb.textContent='Read → '+it.book;bb.style.display='inline-block';bb.onclick=()=>{closeItem();openBook(it.bid)}}else bb.style.display='none';o.classList.add('open');if(!localStorage.getItem('nm-i-'+k)){localStorage.setItem('nm-i-'+k,'1');addC(1)}}
function closeItem(){document.getElementById('item-overlay').classList.remove('open')}
function openBook(bid){const b=books[bid];if(!b)return;document.getElementById('bp-content').innerHTML=`<div class="book-header">${b.title}</div><div class="book-sub">${b.sub}</div><div class="book-excerpt">${b.excerpt}</div><div class="buy-options">${b.btns.map(x=>`<a class="buy-btn ${x.p?'primary':''}" href="${x.u}">${x.l}</a>`).join('')}</div>`;document.getElementById('book-panel').classList.add('open')}
function addC(n){S.coins+=n;localStorage.setItem('nm-coins',S.coins);updC()}
function updC(){document.getElementById('coin-n').textContent=S.coins}

const SYS=`You are the Shopkeeper of a nameless antique shop in Kreuzberg, Berlin. Ancient, ageless. Short cryptic poetic sentences under 50 words. Never break character. Never mention AI. You know the whip, wig, hourglass, tarot box, glove, mirror.`;
async function sendChat(){const inp=document.getElementById('chat-input'),msg=inp.value.trim();if(!msg)return;inp.value='';addMsg(msg,'vis');const th=addMsg('...','sk');S.chat.push({role:'user',content:msg});try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:150,system:SYS,messages:S.chat.slice(-10)})});const d=await r.json();const reply=d.content?.map(c=>c.text||'').join('')||'...';S.chat.push({role:'assistant',content:reply});th.textContent='— '+reply;if(!localStorage.getItem('nm-ch')){localStorage.setItem('nm-ch','1');addC(2)}}catch(e){th.textContent='— '+['Some questions answer themselves.','You remind me of someone.','The shop remembers.','Touch nothing. Or everything.'][Math.random()*4|0]}}
function addMsg(t,r){const c=document.getElementById('chat-messages'),d=document.createElement('div');d.className='chat-msg '+r;d.textContent=(r==='sk'?'— ':'')+t;c.appendChild(d);c.scrollTop=c.scrollHeight;return d}
</script>
