<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NAMENLOS — 2.5D Demo</title>
<meta name="theme-color" content="#0a0a0a">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050505;font-family:'Cormorant Garamond',serif;-webkit-font-smoothing:antialiased}

/* ═══ SCENE CONTAINER ═══ */
.scene{position:fixed;inset:0;overflow:hidden;cursor:crosshair}

/* ═══ PARALLAX LAYERS ═══ */
.layer{position:absolute;will-change:transform;transition:transform 0.08s ease-out}

/* BG — full scene, moves SLOW */
.layer-bg{
  inset:-30px;
  background:url('img/layers/bg.png') center/cover no-repeat;
  z-index:1;
}

/* MID elements — move MEDIUM */
.layer-mid{z-index:2}
.layer-mid img{position:absolute;mix-blend-mode:lighten}

/* FG elements — move FAST */
.layer-fg{z-index:3}
.layer-fg img{position:absolute;mix-blend-mode:lighten}

/* ═══ ELEMENT POSITIONING (% of viewport) ═══ */
/* Counter — mid layer, bottom-left */
.el-counter{left:2%;bottom:5%;width:42%;opacity:0.95}
/* Floor — mid layer */
.el-floor{left:0;bottom:0;width:75%;opacity:0.7}
/* Door with red glow — mid layer, center-back */
.el-door{left:44%;top:22%;height:38%;opacity:0.9}
/* Cabinet right — mid layer */
.el-cabinet{right:8%;top:8%;height:55%;opacity:0.85}
/* Vitrine right — mid layer */
.el-vitrine{right:0;top:0;height:100%;opacity:0.8}
/* Wall left — mid layer */
.el-wall-left{left:0;top:0;height:100%;opacity:0.7}

/* Shopkeeper — foreground, closest */
.el-shopkeeper{left:25%;top:8%;height:55%;filter:brightness(1.1)}
/* Lamp — foreground, glows bright */
.el-lamp{left:37%;top:18%;height:38%;filter:brightness(1.3)}

/* ═══ VIGNETTE ═══ */
.vignette{
  position:fixed;inset:0;z-index:5;pointer-events:none;
  background:radial-gradient(ellipse at 35% 45%,transparent 30%,rgba(0,0,0,0.6) 100%);
}

/* ═══ DUST PARTICLES ═══ */
.dust{position:fixed;inset:0;z-index:4;pointer-events:none;overflow:hidden}
.dust i{position:absolute;width:2px;height:2px;background:rgba(200,160,96,0.3);border-radius:50%;animation:df linear infinite}
@keyframes df{0%{transform:translateY(100vh);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-5vh) translateX(30px);opacity:0}}

/* ═══ HOTSPOTS ═══ */
.hotspot{
  position:absolute;z-index:10;cursor:pointer;
  border:2px solid transparent;
  border-radius:4px;
  transition:all 0.4s ease;
}
.hotspot:hover{
  border-color:rgba(200,160,96,0.3);
  box-shadow:0 0 30px rgba(200,160,96,0.1) inset;
}
.hotspot-label{
  position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;
  text-transform:uppercase;color:#c8a060;
  opacity:0;transition:opacity 0.3s;white-space:nowrap;
  text-shadow:0 0 10px #000,0 0 20px #000;
}
.hotspot:hover .hotspot-label{opacity:1}

/* Pulsing dot on hotspot */
.hotspot::after{
  content:'';position:absolute;top:50%;left:50%;
  width:8px;height:8px;border-radius:50%;
  background:rgba(200,160,96,0.4);
  transform:translate(-50%,-50%);
  animation:hp 2.5s ease-in-out infinite;
}
@keyframes hp{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.4}50%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}

/* ═══ UI OVERLAY ═══ */
.ui-top{
  position:fixed;top:0;left:0;right:0;z-index:20;
  padding:16px 24px;
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(to bottom,rgba(5,5,5,0.8),transparent);
  pointer-events:none;
}
.ui-top *{pointer-events:auto}
.ui-brand{font-family:'Cinzel',serif;font-size:11px;letter-spacing:6px;text-transform:uppercase;color:#3a3025;text-decoration:none}
.ui-brand:hover{color:#c8a060}
.ui-back{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#3a3025;text-decoration:none;transition:color 0.3s}
.ui-back:hover{color:#c8a060}
.ui-back::before{content:'← '}

.ui-hint{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:4px;
  text-transform:uppercase;color:#2a2218;
  animation:fadeHint 4s ease both;
}
@keyframes fadeHint{0%{opacity:0}30%{opacity:0.6}70%{opacity:0.6}100%{opacity:0}}

/* ═══ FLICKER ═══ */
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:0.85}94%{opacity:1}96%{opacity:0.92}97%{opacity:1}}
.flickering{animation:flicker 6s ease-in-out infinite}
</style>
</head>
<body>

<div class="scene" id="scene">
  <!-- LAYER 1: Background (moves slow - 5px) -->
  <div class="layer layer-bg" id="layerBg"></div>

  <!-- LAYER 2: Mid elements (move medium - 15px) — only door glow for depth -->
  <div class="layer layer-mid" id="layerMid" style="inset:-20px">
    <img class="el-door" src="img/layers/door-red.png" alt="">
  </div>

  <!-- LAYER 3: Foreground (moves fast - 30px) — shopkeeper + lamp -->
  <div class="layer layer-fg" id="layerFg" style="inset:-40px">
    <img class="el-shopkeeper" src="img/layers/shopkeeper.png" alt="">
    <img class="el-lamp flickering" src="img/layers/lamp.png" alt="">
  </div>
</div>

<!-- HOTSPOTS -->
<div class="hotspot" id="hs-shopkeeper" style="left:22%;top:15%;width:14%;height:45%">
  <span class="hotspot-label">The Shopkeeper</span>
</div>
<div class="hotspot" id="hs-counter" style="left:5%;top:55%;width:35%;height:35%">
  <span class="hotspot-label">The Counter</span>
</div>
<div class="hotspot" id="hs-door" style="left:42%;top:25%;width:12%;height:35%">
  <span class="hotspot-label">Cinema ↓</span>
</div>
<div class="hotspot" id="hs-cabinet" style="right:10%;top:10%;width:18%;height:50%">
  <span class="hotspot-label">The Shelves</span>
</div>

<!-- VIGNETTE -->
<div class="vignette"></div>

<!-- DUST -->
<div class="dust" id="dust"></div>

<!-- UI -->
<div class="ui-top">
  <a class="ui-brand" href="index.html">Namenlos</a>
  <a class="ui-back" href="index.html">Back</a>
</div>
<div class="ui-hint">Move your mouse to look around</div>

<script>
// Dust particles
const dust=document.getElementById('dust');
for(let i=0;i<25;i++){
  const p=document.createElement('i');
  p.style.left=Math.random()*100+'%';
  p.style.animationDuration=(8+Math.random()*14)+'s';
  p.style.animationDelay=Math.random()*10+'s';
  p.style.width=p.style.height=(1+Math.random()*2)+'px';
  dust.appendChild(p);
}

// 2.5D Parallax
const bg=document.getElementById('layerBg');
const mid=document.getElementById('layerMid');
const fg=document.getElementById('layerFg');

document.addEventListener('mousemove',e=>{
  const cx=(e.clientX/innerWidth-0.5);
  const cy=(e.clientY/innerHeight-0.5);

  // Background — slow (5px)
  bg.style.transform=`translate(${-cx*5}px,${-cy*3}px)`;

  // Midground — medium (15px)
  mid.style.transform=`translate(${-cx*15}px,${-cy*10}px)`;

  // Foreground — fast (30px)
  fg.style.transform=`translate(${-cx*30}px,${-cy*20}px)`;
});

// Touch parallax
let touch0=null;
document.addEventListener('touchstart',e=>{touch0={x:e.touches[0].clientX,y:e.touches[0].clientY}});
document.addEventListener('touchmove',e=>{
  if(!touch0)return;
  const dx=(e.touches[0].clientX-touch0.x)*0.03;
  const dy=(e.touches[0].clientY-touch0.y)*0.03;
  bg.style.transform=`translate(${-dx*2}px,${-dy*2}px)`;
  mid.style.transform=`translate(${-dx*6}px,${-dy*4}px)`;
  fg.style.transform=`translate(${-dx*12}px,${-dy*8}px)`;
});

// Hotspot clicks
document.getElementById('hs-shopkeeper').onclick=()=>alert('The Shopkeeper watches. Chat coming soon.');
document.getElementById('hs-counter').onclick=()=>alert('The whip lies coiled under glass. Skin Me → Book 1');
document.getElementById('hs-door').onclick=()=>alert('Red light leaks from under the door. KINO ↓');
document.getElementById('hs-cabinet').onclick=()=>alert('Books, bottles, secrets. The wig watches from the top shelf.');
</script>
</body>
</html>
