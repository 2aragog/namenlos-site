<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NAMENLOS — Shop Enter 2.5D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;height:100vh;width:100vw;cursor:crosshair;font-family:'Cinzel',serif}
.scene{position:relative;width:100%;height:100%;overflow:hidden}
.layer{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  will-change:transform;
  width:108%;height:108%;
}
.layer img{display:block;width:100%;height:100%;object-fit:cover}
.glow img{filter:brightness(1.15) contrast(1.05)}
.vignette{position:fixed;inset:0;pointer-events:none;z-index:40;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.7) 100%)}
.dust{position:fixed;inset:0;pointer-events:none;z-index:35}
.dust span{position:absolute;width:2px;height:2px;background:rgba(200,170,100,0.3);border-radius:50%;animation:float linear infinite}
@keyframes float{
  0%{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:1}90%{opacity:1}
  100%{transform:translateY(-10vh) translateX(40px);opacity:0}
}
.info{position:fixed;bottom:0;left:0;right:0;padding:12px 24px;
  background:linear-gradient(transparent,rgba(0,0,0,0.9));z-index:60;
  display:flex;justify-content:space-between;align-items:center;pointer-events:none}
.info span{color:#555;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:monospace}
.info .title{color:#c8a060;font-size:13px;letter-spacing:5px}
#loading{position:fixed;inset:0;background:#000;z-index:999;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity 0.8s}
#loading.done{opacity:0;pointer-events:none}
#loading .text{color:#2a2218;font-size:11px;letter-spacing:8px;text-transform:uppercase}
#loading .bar{width:200px;height:1px;background:#1a1a1a}
#loading .fill{height:100%;background:#c8a060;width:0;transition:width 0.3s}
</style>
</head>
<body>
<div id="loading">
  <div class="text">Namenlos</div>
  <div class="bar"><div class="fill" id="loadFill"></div></div>
</div>

<div class="scene" id="scene">
  <!-- BG: static, shopkeeper area darkened -->
  <div class="layer" data-depth="0">
    <img src="img/shop_enter/002_0014_Background.png" alt="shop">
  </div>
  <!-- LAMP: subtle parallax -->
  <div class="layer glow" data-depth="0.6">
    <img src="img/shop_enter/002_0001_Layer-2.png" alt="lamp">
  </div>
  <!-- SHOPKEEPER: most parallax -->
  <div class="layer" data-depth="1.0">
    <img src="img/shop_enter/002_0000_Layer-1.png" alt="shopkeeper">
  </div>
</div>

<div class="vignette"></div>
<div class="dust" id="dust"></div>
<div class="info">
  <span class="title">NAMENLOS</span>
  <span>move your cursor to look around</span>
</div>

<script>
const layers = document.querySelectorAll('.layer');
const maxShift = 15;
let targetX=0,targetY=0,currentX=0,currentY=0;

document.addEventListener('mousemove',e=>{
  targetX=(e.clientX/innerWidth-0.5)*2;
  targetY=(e.clientY/innerHeight-0.5)*2;
});

(function animate(){
  currentX+=(targetX-currentX)*0.06;
  currentY+=(targetY-currentY)*0.06;
  layers.forEach(l=>{
    const d=parseFloat(l.dataset.depth)||0;
    const mx=-currentX*maxShift*d;
    const my=-currentY*maxShift*d*0.4;
    l.style.transform=`translate(calc(-50% + ${mx}px), calc(-50% + ${my}px))`;
  });
  requestAnimationFrame(animate);
})();

if(window.DeviceOrientationEvent){
  window.addEventListener('deviceorientation',e=>{
    if(e.gamma!==null){
      targetX=Math.max(-1,Math.min(1,e.gamma/25));
      targetY=Math.max(-1,Math.min(1,(e.beta-45)/25));
    }
  });
}

const dustEl=document.getElementById('dust');
for(let i=0;i<25;i++){
  const s=document.createElement('span');
  s.style.left=Math.random()*100+'%';
  s.style.animationDuration=(10+Math.random()*15)+'s';
  s.style.animationDelay=Math.random()*12+'s';
  const sz=1+Math.random()*2;
  s.style.width=s.style.height=sz+'px';
  s.style.opacity=0.2+Math.random()*0.3;
  dustEl.appendChild(s);
}

const imgs=document.querySelectorAll('.layer img');
let loaded=0;const fill=document.getElementById('loadFill');const total=imgs.length;
function chk(){fill.style.width=(loaded/total*100)+'%';if(loaded>=total)setTimeout(()=>document.getElementById('loading').classList.add('done'),400);}
imgs.forEach(img=>{if(img.complete){loaded++;chk();}else{img.onload=()=>{loaded++;chk();};img.onerror=()=>{loaded++;chk();};}});
chk();
</script>
</body>
</html>
