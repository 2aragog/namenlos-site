<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NAMENLOS — Shop</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;height:100vh;width:100vw;cursor:crosshair;font-family:'Cinzel',serif}

.scene{position:relative;width:100%;height:100%;overflow:hidden}
.scene-img{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:110%;height:110%;
  object-fit:cover;will-change:transform;
}

/* ═══ HOTSPOTS ═══ */
.hotspots{
  position:absolute;inset:0;z-index:30;
  /* hotspots move with the image */
  top:50%;left:50%;
  width:110%;height:110%;
  transform:translate(-50%,-50%);
  will-change:transform;
}
.hotspot{
  position:absolute;
  cursor:pointer;
  border:1px solid transparent;
  border-radius:6px;
  transition:all 0.5s ease;
}
/* Idle: faint golden pulse to hint "something is here" */
.hotspot::before{
  content:'';
  position:absolute;inset:-2px;
  border-radius:8px;
  border:1px solid rgba(200,160,80,0);
  transition:all 0.5s ease;
}
/* Hover: golden glow */
.hotspot:hover{
  background:rgba(200,160,80,0.08);
  border-color:rgba(200,160,80,0.35);
  box-shadow:0 0 25px rgba(200,160,80,0.15), inset 0 0 20px rgba(200,160,80,0.08);
}
.hotspot:hover::before{
  border-color:rgba(200,160,80,0.2);
  box-shadow:0 0 40px rgba(200,160,80,0.1);
}
/* Label */
.hotspot .label{
  position:absolute;
  bottom:-30px;left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.9);
  color:#c8a060;
  font-size:10px;
  padding:4px 14px;
  white-space:nowrap;
  opacity:0;
  transition:opacity 0.4s;
  letter-spacing:3px;
  text-transform:uppercase;
  pointer-events:none;
  border:1px solid rgba(200,160,80,0.2);
}
.hotspot:hover .label{opacity:1}

/* Subtle idle shimmer on hotspots */
@keyframes shimmer{
  0%,100%{border-color:rgba(200,160,80,0)}
  50%{border-color:rgba(200,160,80,0.12)}
}
.hotspot{animation:shimmer 4s ease-in-out infinite}
.hotspot:nth-child(2){animation-delay:1s}
.hotspot:nth-child(3){animation-delay:2s}
.hotspot:nth-child(4){animation-delay:0.5s}
.hotspot:nth-child(5){animation-delay:1.5s}

.vignette{position:fixed;inset:0;pointer-events:none;z-index:40;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.65) 100%)}
.dust{position:fixed;inset:0;pointer-events:none;z-index:35}
.dust span{position:absolute;width:2px;height:2px;background:rgba(200,170,100,0.3);border-radius:50%;animation:float linear infinite}
@keyframes float{
  0%{transform:translateY(100vh) translateX(0);opacity:0}
  10%{opacity:1}90%{opacity:1}
  100%{transform:translateY(-10vh) translateX(40px);opacity:0}
}
.info{position:fixed;bottom:0;left:0;right:0;padding:12px 24px;
  background:linear-gradient(transparent,rgba(0,0,0,0.9));z-index:60;
  display:flex;justify-content:space-between;align-items:center;pointer-events:none}
.info span{color:#555;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:monospace}
.info .title{color:#c8a060;font-size:13px;letter-spacing:5px}
#loading{position:fixed;inset:0;background:#000;z-index:999;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity 0.8s}
#loading.done{opacity:0;pointer-events:none}
#loading .text{color:#2a2218;font-size:11px;letter-spacing:8px;text-transform:uppercase}
#loading .bar{width:200px;height:1px;background:#1a1a1a}
#loading .fill{height:100%;background:#c8a060;width:0;transition:width 0.3s}
</style>
</head>
<body>
<div id="loading">
  <div class="text">Namenlos</div>
  <div class="bar"><div class="fill" id="loadFill"></div></div>
</div>

<div class="scene">
  <img class="scene-img" id="bg" src="img/shop_enter/shop.png" alt="The Nameless Shop">
  
  <!-- Hotspots: positioned as % of the image -->
  <div class="hotspots" id="hotspots">
    
    <!-- Lamp on counter -->
    <div class="hotspot" data-id="lamp" style="left:22%;top:25%;width:10%;height:32%">
      <span class="label">The Lamp</span>
    </div>
    
    <!-- Counter / display case -->
    <div class="hotspot" data-id="counter" style="left:12%;top:57%;width:38%;height:22%">
      <span class="label">The Counter</span>
    </div>
    
    <!-- Red door -->
    <div class="hotspot" data-id="door" style="left:42%;top:30%;width:14%;height:52%">
      <span class="label">The Red Door</span>
    </div>
    
    <!-- Shelves (left wall) -->
    <div class="hotspot" data-id="shelves" style="left:8%;top:8%;width:34%;height:22%">
      <span class="label">The Shelves</span>
    </div>
    
    <!-- Vitrine / glass cabinet (right) -->
    <div class="hotspot" data-id="vitrine" style="left:78%;top:12%;width:18%;height:65%">
      <span class="label">The Cabinet</span>
    </div>
    
  </div>
</div>

<div class="vignette"></div>
<div class="dust" id="dust"></div>
<div class="info">
  <span class="title">NAMENLOS</span>
  <span>move your cursor to look around</span>
</div>

<script>
// Parallax — image AND hotspots move together
const bg=document.getElementById('bg');
const hs=document.getElementById('hotspots');
let tx=0,ty=0,cx=0,cy=0;
const shift=12;

document.addEventListener('mousemove',e=>{
  tx=(e.clientX/innerWidth-0.5)*2;
  ty=(e.clientY/innerHeight-0.5)*2;
});

(function anim(){
  cx+=(tx-cx)*0.05;
  cy+=(ty-cy)*0.05;
  const t=`translate(calc(-50% + ${-cx*shift}px), calc(-50% + ${-cy*shift*0.4}px))`;
  bg.style.transform=t;
  hs.style.transform=t;
  requestAnimationFrame(anim);
})();

if(window.DeviceOrientationEvent){
  window.addEventListener('deviceorientation',e=>{
    if(e.gamma!==null){
      tx=Math.max(-1,Math.min(1,e.gamma/25));
      ty=Math.max(-1,Math.min(1,(e.beta-45)/25));
    }
  });
}

// Hotspot clicks
document.querySelectorAll('.hotspot').forEach(h=>{
  h.addEventListener('click',()=>{
    const id=h.dataset.id;
    console.log('Clicked:',id);
    // Placeholder — later these navigate to scenes
  });
});

// Dust
const d=document.getElementById('dust');
for(let i=0;i<25;i++){
  const s=document.createElement('span');
  s.style.left=Math.random()*100+'%';
  s.style.animationDuration=(10+Math.random()*15)+'s';
  s.style.animationDelay=Math.random()*12+'s';
  const sz=1+Math.random()*2;
  s.style.width=s.style.height=sz+'px';
  s.style.opacity=0.2+Math.random()*0.3;
  d.appendChild(s);
}

// Loading
const img=document.getElementById('bg');
const fill=document.getElementById('loadFill');
function done(){fill.style.width='100%';setTimeout(()=>document.getElementById('loading').classList.add('done'),400);}
if(img.complete)done();else{img.onload=done;img.onerror=done;}
</script>
</body>
</html>
