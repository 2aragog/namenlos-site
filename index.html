<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NAMENLOS</title>
<meta name="description" content="The shop has no address. But it has a word.">
<meta property="og:title" content="NAMENLOS">
<meta property="og:description" content="The shop has no address. But it has a word. Say it.">
<meta name="theme-color" content="#0a0a0a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;color:#c8a060;font-family:'Cormorant Garamond',Georgia,serif;-webkit-font-smoothing:antialiased}
.bg{position:fixed;inset:-30px;background:url('img/alley.png') center/cover no-repeat;filter:brightness(0.2) blur(4px);z-index:0;transition:transform 0.15s ease-out}
.bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 20%,#0a0a0a 100%)}
.dust{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.dust i{position:absolute;width:2px;height:2px;background:rgba(200,160,96,0.25);border-radius:50%;animation:df linear infinite}
@keyframes df{0%{transform:translateY(100vh);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-5vh) translateX(30px);opacity:0}}
.wrap{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.brand{font-family:'Cinzel',serif;font-size:11px;letter-spacing:10px;text-transform:uppercase;color:#2a2218;margin-bottom:40px;animation:fi 2s ease both}
.tagline{font-size:17px;font-style:italic;color:#4a3a28;margin-bottom:50px;text-align:center;line-height:1.8;max-width:400px;animation:fi 2s ease 0.3s both}
@keyframes fi{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
.doors{display:flex;gap:30px;animation:fi 2s ease 0.6s both}
.door{width:220px;padding:36px 24px 28px;border:1px solid #1a1510;background:rgba(8,6,4,0.8);backdrop-filter:blur(10px);text-align:center;cursor:pointer;transition:all 0.5s cubic-bezier(0.22,1,0.36,1);text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:14px;position:relative;overflow:hidden}
.door::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center bottom,rgba(200,160,96,0.05),transparent 70%);opacity:0;transition:opacity 0.5s}
.door:hover::before{opacity:1}
.door:hover{border-color:#3a2a18;transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.door-icon{font-size:32px;opacity:0.3;transition:opacity 0.4s;line-height:1}
.door:hover .door-icon{opacity:0.7}
.door-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:4px;text-transform:uppercase;color:#c8a060}
.door-desc{font-size:13px;color:#4a3a28;font-style:italic;line-height:1.6}
.door-tag{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#3a3025;padding:4px 10px;border:1px solid #1a1510;margin-top:4px}
.foot{position:fixed;bottom:16px;left:0;right:0;text-align:center;z-index:10;font-size:11px;color:#1a1510;letter-spacing:2px;font-family:'Cinzel',serif}
@media(max-width:520px){.doors{flex-direction:column;gap:20px}.door{width:260px}}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<div class="dust" id="dust"></div>
<div class="wrap">
  <div class="brand">Namenlos</div>
  <div class="tagline">The shop has no address. But it has a word.<br>Choose how you enter.</div>
  <div class="doors">
    <a class="door" href="classic.html">
      <div class="door-icon">📜</div>
      <div class="door-title">Read</div>
      <div class="door-desc">Scroll through the story. Browse the artifacts. Buy the books.</div>
      <div class="door-tag">All devices</div>
    </a>
    <a class="door" href="dev.html">
      <div class="door-icon">🚪</div>
      <div class="door-title">Explore</div>
      <div class="door-desc">Walk the shop. Click, discover, talk to the shopkeeper.</div>
      <div class="door-tag">Desktop best</div>
    </a>
  </div>
</div>
<div class="foot">Mary-Ann Black</div>
<script>
const d=document.getElementById('dust');for(let i=0;i<20;i++){const p=document.createElement('i');p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*14)+'s';p.style.animationDelay=Math.random()*10+'s';p.style.width=p.style.height=(1+Math.random()*2)+'px';d.appendChild(p)}
document.addEventListener('mousemove',e=>{const x=(e.clientX/innerWidth-0.5)*8,y=(e.clientY/innerHeight-0.5)*5;document.getElementById('bg').style.transform=`translate(${-x}px,${-y}px)`});
const p=new URLSearchParams(location.search);if(p.get('r')==='1')location.href='classic.html?r=1';
</script>
</body>
</html>
